<ion-card class="chart-card">
  <ion-card-title class="chart-title">
    {{ 'analytics.clicksOverTime' | translate }}
  </ion-card-title>

  @if (clicksOverTime.length > 0) {
    <div class="chart-scroll-wrapper" #scrollWrapper>
      <div
        class="chart-inner"
        [style.minWidth]="needsScroll ? chartWidth : '100%'"
      >
        <apx-chart
          [series]="chartOptions.series"
          [chart]="chartOptions.chart"
          [colors]="chartOptions.colors"
          [fill]="chartOptions.fill"
          [dataLabels]="chartOptions.dataLabels"
          [stroke]="chartOptions.stroke"
          [xaxis]="chartOptions.xaxis"
          [yaxis]="chartOptions.yaxis"
          [grid]="chartOptions.grid"
          [tooltip]="chartOptions.tooltip"
        ></apx-chart>
      </div>
    </div>
  } @else {
    <div class="no-data">{{ 'analytics.noData' | translate }}</div>
  }
</ion-card>
