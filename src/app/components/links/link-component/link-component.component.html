<div class="links">

  <div class="header">
    <div class="title">Your links</div>
    <div class="subtitle"> {{links().length}} link{{links.length > 1? "s": ""}} created</div>
  </div>

  <ion-card class="search-container">
    <ion-icon name="search-outline" class="search-icon"></ion-icon>

    <input [(ngModel)]="searchElement" type="text" placeholder="Search by link name, short link, or original URL..."  class="search-input" />
  </ion-card>

  @for (link of filteredLinks(); track link.id) {
  <ion-card class="link_container">
    <ion-card-content class="link_content">
      <div class="container-link">
        @if (link.name) {
        <div class="container-name">
          {{link.name}}
        </div>
        }
        <div class="urls-container">
          <div class="container-short-link">
            <div class="short-link">{{link.shortUrl}}</div>
            <app-copy-button [text]="link.shortUrl" />
          </div>
          <div class="container-original-link">
            <div class="original-link">{{link.originalUrl}}</div>
          </div>
        </div>
        <div class="container-date-clicks">
          <div class="date">{{link.creationDate | relativeTime}}</div>
          <div class="container-stats">
            <ion-icon class="stats-icon" name="stats-chart-outline"></ion-icon>
            <div class="click-counter">{{link.clickCounter}} clicks</div>
          </div>
        </div>
      </div>


      <div class="container-buttons">
        <ion-button (click)="developerAdvertance()" class="button stats-button" fill="clear"><ion-icon
            name="stats-chart-outline"></ion-icon></ion-button>
        <app-qr-code-button [url]="link.shortUrl"></app-qr-code-button>
        <ion-button (click)="developerAdvertance()" class="button" fill="clear"><ion-icon name="create-outline"></ion-icon></ion-button>
        <ion-button class="button delete-button" (click)="deleteLink(link.id)" fill="clear"><ion-icon
            name="trash-outline"></ion-icon></ion-button>
        <ion-button (click)="developerAdvertance()" class="button" fill="clear"><ion-icon name="settings-outline"></ion-icon></ion-button>
      </div>
    </ion-card-content>
  </ion-card>
  }
  <!-- <app-qr-code-modal [shortUrl]="'asdfasfd.com'"></app-qr-code-modal> -->
</div>
