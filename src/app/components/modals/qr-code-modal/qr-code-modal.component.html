<div class="modal-wrapper">
  <div class="modal-header">
    <div class="qr-icon-wrapper">
      <ion-icon name="qr-code-outline"></ion-icon>
    </div>
    <span class="modal-title">{{ 'home.qrTitle' | translate }}</span>
    <ion-button (click)="dismiss()" fill="clear" class="close-btn">
      <ion-icon name="close-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </div>

  <div class="modal-content">
    <p class="url-label">{{ 'home.qrUrlLabel' | translate }}</p>
    <p class="url-text">{{ shortUrl }}</p>

    <div class="qr-container">
      @if(isLoading){
        <ion-spinner name="crescent"></ion-spinner>
      }
      @if(!isLoading && qrDataUrl){
        <img [src]="qrDataUrl" [alt]="'home.qrImageAlt' | translate" />
      }
    </div>

    <div class="actions">
      <ion-button expand="block" fill="outline" color="medium" (click)="dismiss()">
        {{ 'home.close' | translate }}
      </ion-button>
      <ion-button expand="block" [disabled]="isLoading" (click)="downloadQR()">
        <ion-icon name="download-outline" slot="start"></ion-icon>
        {{ 'home.download' | translate }}
      </ion-button>
    </div>
  </div>
</div>
